name: Terraform PR Validation

on:
  pull_request:
    branches:
      - main
      - test
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Print GitHub Context
        run: |
          echo "========== GitHub Context ============"
          echo "Repository        : ${{ github.repository }}"
          echo "Repository Owner  : ${{ github.repository_owner }}"
          echo "Event Name        : ${{ github.event_name }}"
          echo "Ref               : ${{ github.ref }}"
          echo "Ref Name          : ${{ github.ref_name }}"
          echo "Base Ref          : ${{ github.base_ref }}"
          echo "Head Ref          : ${{ github.head_ref }}"
          echo "Actor             : ${{ github.actor }}"
          echo "Workflow          : ${{ github.workflow }}"
          echo "Run ID            : ${{ github.run_id }}"
          echo "===================================="

      - name: Azure Login
        id: azure-login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Select Environment
        run: |
          case "${{ github.base_ref }}" in
            main)
              echo "TFVARS=environments/prod.tfvars" >> $GITHUB_ENV
              ;;
            test)
              echo "TFVARS=environments/test.tfvars" >> $GITHUB_ENV
              ;;
            dev)
              echo "TFVARS=environments/dev.tfvars" >> $GITHUB_ENV
              ;;
          esac

      - name: Print Selected Environment
        run: |
          echo "Selected TFVARS: $TFVARS"

      - name: Terraform Plan
        run: terraform plan -var-file=$TFVARS
