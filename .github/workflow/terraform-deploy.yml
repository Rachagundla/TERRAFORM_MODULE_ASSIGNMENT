name: Terraform Deploy

on:
  push:
    branches:
      - dev
      - test
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Select Environment
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "TFVARS=environments/prod.tfvars" >> $GITHUB_ENV
              echo "ENVIRONMENT=prod" >> $GITHUB_ENV
              ;;
            test)
              echo "TFVARS=environments/test.tfvars" >> $GITHUB_ENV
              echo "ENVIRONMENT=test" >> $GITHUB_ENV
              ;;
            dev)
              echo "TFVARS=environments/dev.tfvars" >> $GITHUB_ENV
              echo "ENVIRONMENT=dev" >> $GITHUB_ENV
              ;;
          esac

      - name: Terraform Plan
        run: terraform plan -var-file=$TFVARS -out=tfplan

      - name: Show Terraform Plan
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
